<div class="app-shell" [class.sidebar-open]="sidebarOpen()">
  <div class="backdrop" (click)="toggleSidebar()"></div>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <img src="homesilo-logo-full.png" alt="homesilo logo">
      </div>
      <span class="logo-text">homesilo</span>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/home" routerLinkActive="active" class="nav-link"
        title="Home" (click)="closeOnMobile()">
        <span class="material-symbols-rounded">home</span>
        <span class="nav-label">Home</span>
      </a>
      <a routerLink="/my-files" routerLinkActive="active" class="nav-link"
         title="My Files" (click)="closeOnMobile()">
        <span class="material-symbols-rounded">folder</span>
        <span class="nav-label">My Files</span>
      </a>
      <a routerLink="/starred" routerLinkActive="active" class="nav-link"
         title="Starred" (click)="closeOnMobile()">
        <span class="material-symbols-rounded">star</span>
        <span class="nav-label">Starred</span>
      </a>
      <a routerLink="/trash" routerLinkActive="active" class="nav-link"
         title="Trash" (click)="closeOnMobile()">
        <span class="material-symbols-rounded">delete</span>
        <span class="nav-label">Trash</span>
      </a>
    </nav>

    <app-storage-indicator [sidebarOpen]="sidebarOpen()" />
  </aside>

  <div class="main-area">
    <header class="topbar">
      <button class="menu-btn" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <span class="material-symbols-rounded">menu</span>
      </button>

      @if (!isHome()) {
        <div class="search-bar">
          <span class="material-symbols-rounded">search</span>
          <input
            type="text"
            class="search-input"
            placeholder="Search in homesilo..."
            [value]="searchInputValue()"
            (input)="onSearchInput($event)"
            (keydown.escape)="onClearSearch()"
            aria-label="Search files" />
        @if (searchInputValue()) {
          <button
            class="search-clear-btn"
            (click)="onClearSearch()"
            aria-label="Clear search"
            type="button">
            <span class="material-symbols-rounded">close</span>
          </button>
        }
        </div>
      }
      <div class="topbar-user">
        <button class="logout-btn" (click)="onLogout()">Sign out</button>
      </div>
    </header>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>

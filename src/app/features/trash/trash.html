<div class="files-page">
  <div class="page-header">
    <div>
      <h2>Trash</h2>
      <p class="subtitle">{{ files().length }} file{{ files().length !== 1 ? 's' : '' }} in trash</p>
    </div>
  </div>

  @if (errorMessage()) {
    <div class="server-error">{{ errorMessage() }}</div>
  }

  @if (loading()) {
    <div class="empty-state">Loading files...</div>
  } @else if (files().length === 0) {
    <div class="empty-state">
      <span class="material-symbols-rounded empty-icon">delete</span>
      <h3>Trash is empty</h3>
      <p>Files you move to trash will appear here.</p>
    </div>
  } @else {
    <app-file-table
      [files]="files()"
      [actions]="['restore', 'deleteForever']"
      dateColumnLabel="Deleted"
      (restore)="restoreFile($event)"
      (deleteForever)="deleteFile($event)" />

    @if (hasMore()) {
      <div class="show-more-wrap">
        <button
          class="show-more-btn"
          (click)="loadMore()"
          [disabled]="loadingMore()">
          @if (loadingMore()) {
            <span class="spinner"></span>
            Loading...
          } @else {
            Show more
          }
        </button>
      </div>
    }
  }
</div>

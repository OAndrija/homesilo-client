<div class="files-page">
  <div class="page-header">
    <div>
      <h2>My Files</h2>
      <p class="subtitle">{{ files().length }} file{{ files().length !== 1 ? 's' : '' }}</p>
    </div>
    <button
      class="upload-btn"
      (click)="triggerFilePicker()"
      [disabled]="uploading()">
      @if (uploading()) {
        <span class="spinner"></span>
      } @else {
        <span class="material-symbols-rounded">upload</span>
      }
      {{ uploading() ? 'Uploading...' : 'Upload Files' }}
    </button>
    <input
      #fileInput
      hidden
      type="file"
      (change)="onFileSelected($event)" />
  </div>

  @if (errorMessage()) {
    <div class="server-error">{{ errorMessage() }}</div>
  }

  @if (loading()) {
    <div class="empty-state">Loading files...</div>
  } @else if (files().length === 0) {
    <div class="empty-state">
      <span class="material-symbols-rounded empty-icon">cloud_upload</span>
      <h3>No files yet</h3>
      <p>Upload your first backup to HomeSilo.</p>
    </div>
  } @else {
    <app-file-table
      [files]="files()"
      [actions]="['download', 'trash']"
      dateColumnLabel="Uploaded"
      (download)="downloadFile($event)"
      (trash)="trashFile($event)" />
  }
</div>

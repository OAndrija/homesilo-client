<div class="home-page">
  <nav class="navbar">
    <div class="nav-logo">
      <div class="logo-mark">🗄️</div>
      <span class="logo-text">HomeSilo</span>
    </div>
    <div class="nav-right">
      <span class="nav-username">{{ username }}</span>
      <button class="logout-btn" (click)="logout()">Sign out</button>
    </div>
  </nav>

  <main class="content">
    <div class="welcome">
      <p class="greeting">Good to see you</p>
      <h1>Hi, {{ username }} 👋</h1>
    </div>

    <div class="cards-grid">
      <div class="card">
        <p class="card-label">User ID</p>
        <p class="card-value mono">{{ userId }}</p>
      </div>
      <div class="card">
        <p class="card-label">Session</p>
        <div class="status">
          <span class="status-dot"></span>
          <span class="card-value">Active</span>
        </div>
      </div>
    </div>

    <div class="card token-card">
      <p class="card-label">JWT Token</p>
      <p class="token-value">{{ token }}</p>
    </div>
  </main>
</div>
